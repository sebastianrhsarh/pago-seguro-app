@if (authReady$ | async) {
  <nav class="main-nav">
    <a class="brand" [routerLink]="['/']" aria-label="Ir a productos">
      <img
        [ngSrc]="logoPath"
        alt="Pago Seguro"
        class="brand-logo"
        width="1065"
        height="315"
        priority
      />
    </a>

    <div class="main-links">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Productos</a>
      @if (user$ | async) {
        <a routerLink="/crear-post" routerLinkActive="active-link">Publicar</a>
        <a routerLink="/mis-compras" routerLinkActive="active-link">Mis Compras</a>
        <a routerLink="/mis-ventas" routerLinkActive="active-link">Mis Ventas</a>
      }
    </div>

    <div class="nav-actions">
      @if (user$ | async; as user) {
        <div class="user-menu">
          <button type="button" class="icon-btn user-btn" [attr.aria-label]="'Usuario: ' + user.email">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
              <circle cx="12" cy="8" r="4" stroke="#475569" stroke-width="2"/>
              <path d="M4 20C4 16.6863 7.58172 14 12 14C16.4183 14 20 16.6863 20 20" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="user-tooltip">{{ user.email }}</span>
        </div>
        <button type="button" class="icon-btn logout-btn" (click)="logout()" aria-label="Cerrar sesion">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
            <path d="M10 6H6C4.89543 6 4 6.89543 4 8V16C4 17.1046 4.89543 18 6 18H10" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
            <path d="M13 8L18 12L13 16" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 12H9" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      } @else {
        <a class="login-link" routerLink="/login">Login</a>
      }
    </div>
  </nav>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
} @else {
  <section class="app-bootstrap" aria-live="polite" aria-busy="true">
    <img
      src="assets/logo.png"
      alt="Pago Seguro"
      class="bootstrap-logo"
      width="1065"
      height="315"
      loading="eager"
      decoding="sync"
      fetchpriority="high"
    />
    <div class="bootstrap-loader"></div>
    <p>Cargando sesion segura...</p>
  </section>
}
