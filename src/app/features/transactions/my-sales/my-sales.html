<div class="my-sales">
  <h2>Mis Ventas</h2>

  <ng-container *ngIf="transactions && transactions.length > 0; else sinVentas">
    <div *ngFor="let t of transactions" class="sale-card">
      <p><strong>Producto:</strong> {{ t.titulo }}</p>
      <p><strong>Monto:</strong> ${{ t.monto }}</p>
      <p>
        <strong>Estado:</strong>
        <span
          class="badge"
          [class.pending]="t.estado === 'pendiente'"
          [class.completed]="t.estado === 'completado'"
          [class.cancelado]="t.estado === 'cancelado'"
        >
          {{ t.estado }}
        </span>
      </p>

      <p>
        <strong>Estado del producto:</strong>
        <span
          class="badge post-status"
          [class.disponible]="t.postEstado === 'disponible'"
          [class.reservado]="t.postEstado === 'reservado'"
          [class.vendido]="t.postEstado === 'vendido'"
        >
          {{ t.postEstado }}
        </span>
      </p>

      <div *ngIf="t.estado === 'pendiente'" class="confirm">
        <input
          type="text"
          [(ngModel)]="codigoIngresadoMap[t.id]"
          placeholder="Ingresar código"
        />
        <button (click)="validarCodigo(t)">Confirmar entrega</button>
        <p class="helper-text">El comprador ve este codigo en Mis Compras y debe compartirlo contigo.</p>
      </div>

      <p *ngIf="t.estado === 'completado'" class="confirmation-message">
        ✅ Entrega confirmada
      </p>

      <p *ngIf="t.estado === 'cancelado'" class="cancelled-message">
        Compra cancelada por el comprador
      </p>
    </div>
  </ng-container>

  <ng-template #sinVentas>
    <p>No hay ventas registradas.</p>
  </ng-template>
</div>
