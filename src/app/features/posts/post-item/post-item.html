<ng-container *ngIf="post; else cargando">
  <div class="post-card">
    <h3>{{ post.titulo }}</h3>
    <p class="price">${{ post.precio }}</p>
    <p>
      <strong>Estado:</strong>
      <span
        class="state-badge"
        [class.disponible]="post.estado === 'disponible'"
        [class.reservado]="post.estado === 'reservado'"
        [class.vendido]="post.estado === 'vendido'"
      >
        {{ post.estado }}
      </span>
    </p>
    <button
      *ngIf="post.estado === 'disponible' && !isOwner"
      class="buy-button"
      (click)="comprar(post)"
    >
      Comprar
    </button>
    <p *ngIf="isOwner" class="owner-label">
      Este es tu producto
    </p>
  </div>
</ng-container>

<ng-template #cargando>
  <div>Cargando post...</div>
</ng-template>
