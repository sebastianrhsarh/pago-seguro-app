<ng-container *ngIf="post; else cargando">
  <div class="post-card" (click)="onCardClick(post)">
    <div
      class="media-shell"
      [class.has-image]="!!post.imageUrl"
      [class.image-loaded]="imageLoaded"
      [class.can-buy]="true"
    >
      @if (post.imageUrl) {
        @if (!imageLoaded) {
          <div class="image-skeleton" aria-hidden="true"></div>
        }

        <img
          class="product-image"
          [src]="post.imageUrl"
          [alt]="post.titulo"
          [attr.loading]="highPriority ? 'eager' : 'lazy'"
          [attr.fetchpriority]="highPriority ? 'high' : 'auto'"
          decoding="async"
          (load)="onImageLoad()"
          (error)="onImageError()"
        />
      }

      <div class="chips-top">
        <span
          class="state-badge"
          [class.disponible]="post.estado === 'disponible'"
          [class.reservado]="post.estado === 'reservado'"
          [class.vendido]="post.estado === 'vendido'"
        >
          {{ post.estado === 'reservado' ? 'pendiente' : post.estado }}
        </span>

        <span *ngIf="isOwner" class="owner-label">Este es tu producto</span>
      </div>

      <span class="buy-hint">
        Ver detalle
      </span>
    </div>

    <div class="card-copy">
      <div class="title-row">
        <h3>{{ post.titulo }}</h3>
        <p class="price">${{ formatPrice(post.precio) }}</p>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #cargando>
  <div>Cargando post...</div>
</ng-template>
